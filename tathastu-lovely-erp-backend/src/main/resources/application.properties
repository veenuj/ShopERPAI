spring.application.name=tathastu-lovely-erp-backend
# Server Configuration
server.port=8080

# --- DATABASE CONFIGURATION (Cloud Friendly H2) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create tables automatically based on your Java entities
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Gemini AI Configuration (Using the Compatibility Layer)
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-2.5-flash